name: PR Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  skipcheck:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.filter.outputs.skip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect non-trivial changes
        id: filter
        run: |
          set +e
          set -xo pipefail

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          BASE=${{ github.base_ref || 'origin/main' }}
          git fetch origin $BASE --depth=1

          if git diff --quiet origin/$BASE -- \
            . \
            ':!.github/**' \
            ':!.vscode/**' \
            ':!LICENSE' \
            ':!README.md' \
            ':!SECURITY.md' \
            ':!MANIFEST.in' \
            ':!.gitignore' \
            ':!.pre-commit-config.yaml'
          then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: skipcheck
    if: ${{ needs.skipcheck.outputs.skip == 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Cache uv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev --extra test

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy daft_h3/ tests/

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    needs: skipcheck
    if: ${{ needs.skipcheck.outputs.skip == 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust lint
        run: cargo clippy --locked -- -D warnings

      - name: Rust tests
        run: cargo test --locked

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [skipcheck, lint, rust-checks]
    if: |
      always() &&
      needs.skipcheck.outputs.skip == 'false' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - name: Install package
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest tests/ -v -n auto
