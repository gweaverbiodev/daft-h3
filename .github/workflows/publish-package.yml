name: Publish Package

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      test-pypi:
        description: Publish to TestPyPI instead of PyPI
        type: boolean
        default: false

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-15-intel
            arch: x86_64
          - os: macos-14
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute version from git tag
        id: version
        run: |
          python -m pip install --upgrade 'setuptools-scm>=8' yq
          # PEP 440: 0.1.1.dev7+g4ac6d5f  ->  Cargo SemVer: 0.1.1-dev7+g4ac6d5f
          PY_VERSION="$(python -m setuptools_scm)"
          CARGO_VERSION="${PY_VERSION//.dev/-dev}"
          echo "python=$PY_VERSION"   | tee -a "$GITHUB_OUTPUT"
          echo "cargo=$CARGO_VERSION" | tee -a "$GITHUB_OUTPUT"
          tomlq -i -t ".package.version = \"$CARGO_VERSION\"" Cargo.toml

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.2
        env:
          # Pretend-version lets setuptools-scm produce a stable version
          # inside the manylinux container without git metadata surgery.
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DAFT_H3: ${{ steps.version.outputs.python }}
          CIBW_ENVIRONMENT_PASS_LINUX: SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DAFT_H3
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          # Install Rust once per container; rust-toolchain.toml pins the exact channel.
          CIBW_BEFORE_ALL_LINUX: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --profile minimal
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"
          # Smoke-test the built wheel: import, register, run full suite.
          CIBW_TEST_REQUIRES: pytest pytest-xdist
          CIBW_TEST_COMMAND: pytest {project}/tests -v -n auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute version from git tag
        run: |
          python -m pip install --upgrade 'setuptools-scm>=8' yq build
          PY_VERSION="$(python -m setuptools_scm)"
          CARGO_VERSION="${PY_VERSION//.dev/-dev}"
          tomlq -i -t ".package.version = \"$CARGO_VERSION\"" Cargo.toml
          echo "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DAFT_H3=$PY_VERSION" >> "$GITHUB_ENV"

      - name: Build sdist
        run: python -m build --sdist

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Smoke-test sdist install
        # Rebuild from sdist in an isolated venv: catches MANIFEST.in gaps,
        # missing source files, and Cargo.toml patching mistakes that don't
        # show up in the wheel path (which goes through cibuildwheel).
        run: |
          python -m venv /tmp/sdist-venv
          source /tmp/sdist-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install dist/*.tar.gz
          pytest tests/ -v

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.test-pypi) && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.test-pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.test-pypi)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
